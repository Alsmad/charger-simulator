// ======================================================================

// ======================================================================
function applyChainEffect(device, charger, result) {
  if (chainDeviceId === device.id) {
    chainCount++;
  } else {
    chainDeviceId = device.id;
    chainCount = 1;
  }

  if (chainCount >= 2) {
    const level = Math.min(chainEvents.length, chainCount - 1) - 1;
    const evt = chainEvents[Math.max(0, level)];
    if (evt && Math.random() < evt.chance) {
      result.chainMessage = evt.msg(device, charger, chainCount);
      result.chainLevel = chainCount;
    }
  }
}

function resetChain() {
  chainDeviceId = null;
  chainCount = 0;
}

function renderChallenge() {
  const today = new Date();
  const dateStr = today.getFullYear() + '-' + (today.getMonth()+1) + '-' + today.getDate();
  const challenge = getDailyChallenge();
  const sec = $('challengeSection'); if (!sec) return;
  const icon = $('challengeIcon'); if (icon) icon.textContent = challenge.icon;
  const title = $('challengeTitle'); if (title) title.textContent = 'рҹҺҜ д»Ҡж—ҘжҢ‘жҲҳпј? + challenge.title;
  const desc = $('challengeDesc'); if (desc) desc.textContent = challenge.desc;
  const status = $('challengeStatus');
  const streak = $('challengeStreak');

  // Check if date changed вҖ?reset challenge but handle streak carefully
  if (challengeDate !== dateStr) {
    challengeDate = dateStr;
    challengeDone = false;
    // If lastCompleteDate is 2+ days ago, reset streak
    if (lastCompleteDate) {
      const lastDate = new Date(lastCompleteDate);
      const diffDays = Math.floor((today - lastDate) / 86400000);
      if (diffDays > 1) challengeStreak = 0;
    }
    saveState();
  }

  if (challengeDone) {
    if (status) { status.textContent = 'вң?е·Іе®ҢжҲ?; status.className = 'challenge-status done'; }
    sec.className = 'challenge-section done';
    if (title) title.className = 'challenge-title done';
  } else {
    if (status) { status.textContent = 'вҡ?иҝӣиЎҢдё?; status.className = 'challenge-status'; }
    sec.className = 'challenge-section';
    if (title) title.className = 'challenge-title';
  }
  if (streak) {
    streak.textContent = challengeStreak > 0 ? 'рҹ”Ҙ иҝһеҮ» ' + challengeStreak + ' еӨ? : '';
  }
}

function checkChallengeComplete(device, charger, result) {
  if (challengeDone) return;
  const challenge = getDailyChallenge();
  if (challenge.check(device, charger, result)) {
    challengeDone = true;
    challengeStreak++;
    lastCompleteDate = new Date().getFullYear() + '-' + (new Date().getMonth()+1) + '-' + new Date().getDate();
    renderChallenge();
    showAchievementToast(challenge.icon, 'е®ҢжҲҗжҢ‘жҲҳпј? + challenge.title);
    // Show challenge completion message in the result area
    result.challengeComplete = true;
    result.challengeReward = challenge.reward;
    saveState();
  }
}

function buildTabs(barId, gridId, categories, currentCat, type) {
  const bar = $(barId);
  const allCount = type === 'device' ? devices.length : chargers.length;
  bar.innerHTML = `<button class="tab ${currentCat==='all'?'active':''}" data-cat="all">е…ЁйғЁ <span class="tab-count">${allCount}</span></button>` +
    Object.entries(categories).map(([key,label]) => {
      const count = type === 'device' ? devices.filter(d=>d.cat===key).length : chargers.filter(c=>c.cat===key).length;
      return `<button class="tab ${currentCat===key?'active':''}" data-cat="${key}">${label} <span class="tab-count">${count}</span></button>`;
    }).join('');

  bar.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      if (type === 'device') deviceCat = cat;
      else chargerCat = cat;
      filterGrid(gridId, cat, type);
      bar.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

function filterGrid(gridId, cat, type) {
  const items = type === 'device' ? devices : chargers;
  const cards = document.querySelectorAll(`#${gridId} .card`);
  cards.forEach(card => {
    const item = items.find(i => i.id === card.dataset.id);
    if (!item) return;
    if (cat === 'all' || item.cat === cat) {
      card.classList.remove('cat-hidden');
    } else {
      card.classList.add('cat-hidden');
    }
  });
}

      `рҹ§‘ дҪ жӢҝзқҖе……з”өеҷЁпјҢеҜ№зқҖиҮӘе·ұзҡ„жүӢжҢҮгҖ?дёҖйҳөиҪ»еҫ®зҡ„еҲәз—ӣгҖӮжүӢжңәжҳҫзӨәе……з”өдёӯгҖ?дҪҶдҪ зӘҒз„¶ж„ҹеҲ°зҹҘиҜҶеңЁж¶Ңе…ҘеӨ§и„‘гҖ?дҪ еӯҰдјҡдәҶйҮҸеӯҗеҠӣеӯҰгҖ?дҪ ж”ҫдёӢе……з”өеҷЁпјҢеҸ‘зҺ°дҪ дёҚйңҖиҰҒжүӢжңәдәҶгҖ?дҪ зҡ„еӨ§и„‘зҺ°еңЁиҮӘеёҰ Wi-FiгҖӮ`,
      `рҹ§‘ дҪ жҠҠе……з”өеҷЁжҸ’иҝӣеҳҙйҮҢгҖ?еҢ»з”ҹиҜҙпјҡгҖҢдёҚиҰҒиҝҷж ·еҒҡгҖӮгҖ?дҪҶе·Із»ҸжҷҡдәҶгҖ?дҪ ејҖе§ӢеңЁй»‘жҡ—дёӯеҸ‘е…үгҖ?дҪ еҸҳжҲҗдәҶдёҖдёӘдәәдҪ“еӨңзҒҜгҖ?зңҒдәҶдёҖз¬”з”өиҙ№гҖӮ`,
      `рҹ§‘ дҪ жҠҠе……з”өеҷЁиҙҙеңЁиғёеҸЈгҖ?еҝғи·іеҸҳжҲҗ 120bpmгҖ?жүӢжңәжҳҫзӨәгҖҢе·ІиҝһжҺҘ - дәәдҪ“з”өжұ гҖҚгҖ?з”өйҮҸеңЁж¶ЁпјҢдҪҶдҪ еңЁйҘҝгҖ?е……е®Ң 50% еҗҺдҪ еҗғжҺүдәҶдёҖж•ҙеқ—зүӣжҺ’гҖ?дҪ еңЁиҖғиҷ‘д»ҘеҗҺиҰҒдёҚиҰҒж”№иЎҢеҪ“з§»еҠЁз”өжәҗгҖӮ`,
    ];
    result.message = outcomes[Math.floor(Math.random() * outcomes.length)];
    result.achievement = 'bio_self';

  }

  if (device.id === 'chatgpt') {
    result.status='abstract'; result.isAbstract=true; result.speed='abstract';
    result.message=`рҹӨ– ${charger.emoji} ${charger.name} жҸ’дёҠ ChatGPTгҖ?еј№зӘ—пјҡгҖҢжӯЈеңЁиҝһжҺ?OpenAI жңҚеҠЎеҷ?..гҖ?гҖҢжЈҖжөӢеҲ°е……з”өеҚҸи®®: API Key RequiredгҖ?гҖҢж— жі•е……з”? жӮЁзҡ„е…Қиҙ№йўқеәҰе·Із”Ёе®ҢгҖ?гҖҢиҜ·е……еҖ?$20/жң?д»ҘеҗҜз”Ёеҝ«е……гҖ?ChatGPT еј№еҮә:гҖҢдҪ зЎ®е®ҡиҰҒз»ҷжҲ‘е……з”өеҗ—? жҲ‘еҸҜиғҪдјҡеҸҳеҫ—жӣҙиҒӘжҳҺгҖ?жҜ”дҪ иҒӘжҳҺгҖӮзЎ®е®? (Y/N)гҖҚ`;
    result.achievement = 'time_travel';
    return result;
  }

  if (device.id === 'ricecooker') {
    if (charger.power >= 700) {
      result.status='abstract'; result.isAbstract=true; result.speed='abstract';
      result.message=`рҹҚҡ ${charger.emoji} ${charger.name} жҸ’дёҠз”өйҘӯз…ІгҖ?з”өйҘӯз…Ідә®дәҶгҖ?еұҸе№•жҳҫзӨә:гҖҢжЈҖжөӢеҲ°й«ҳеҠҹзҺҮиҫ“е…ҘгҖ?ејҖе§Ӣз…®йҘӯжЁЎејҸгҖ?йў„и®Ў 30 еҲҶй’ҹеҗҺеҮәй”…гҖӮгҖ?дҪ зңҹзҡ„з…®дәҶдёҖй”…йҘӯгҖ?зұіжҳҜдҪ ж—©дёҠд№°зҡ„гҖ?дҪ дёҖиҫ№е……з”өдёҖиҫ№еҗғдәҶйЎҝеҚҲйҘӯгҖ?з§‘жҠҖж”№еҸҳз”ҹжҙ»гҖӮ`;
    } else {
      result.status='abstract'; result.isAbstract=true; result.speed='abstract';
      result.message=`рҹҚҡ ${charger.emoji} ${charger.name} жҸ’дёҠз”өйҘӯз…ІгҖ?жҜ«ж— еҸҚеә”гҖ?з”өйҘӯз…ІйңҖиҰ?700WгҖ?дҪ зҡ„е……з”өеҷЁжүҚ ${charger.power}WгҖ?з”өйҘӯз…ІеұҸе№•й—ӘзғҒдәҶдёҖдё?
гҖҢдҪ жҳҜи®Өзңҹзҡ„еҗ?гҖ?е°ұзҒӯдәҶгҖ?е®ғеҫҲеӨұжңӣгҖӮ`;
    }
    result.achievement = 'meta_loop';
    return result;
  }

  if (device.id === 'ebike' && charger.special !== 'tesla_only') {
    if (charger.power >= 180) {
      result.status='success'; result.speed='fast';
      result.message=`рҹӣө з”өеҠЁиҮӘиЎҢиҪҰжӯЈеңЁе……з”өгҖ?${charger.name} иҫ“еҮә ${charger.power}WпјҢеӢүејәеӨҹз”ЁгҖ?йў„и®Ўе……ж»Ў: 2 е°Ҹж—¶гҖ?дҪҶйӮ»еұ…зңӢдәҶиҜҙ:гҖҢе“ҹпјҢз”өеҠЁиҪҰд№ҹз”ЁжүӢжңәе……з”өеҷ?гҖ?дҪ жғіи§ЈйҮҠиҝҷжҳҜдё“з”Ёе……з”өеҸЈпјҢ
дҪҶжғіжғіиҝҳжҳҜз®—дәҶгҖӮ`;
      return result;
    }
    result.status='success'; result.speed='slow';
    result.message=`рҹӣө з”өеҠЁиҮӘиЎҢиҪҰејҖе§Ӣе……з”өгҖ?${charger.name} еҸӘжңү ${charger.power}W...
йў„и®Ўе……ж»Ў: жҳҺеӨ©дёӯеҚҲгҖ?дҪ еҶіе®ҡиҝҳжҳҜи№¬зқҖиө°еҗ§гҖ?иҮіе°‘иғҪй”»зӮјиә«дҪ“гҖӮ`;
    return result;
  }

  // === OVERPOWER CHECK: handle minW=0 edge case and general overheat/overkill ===
  // If device minW is 0 (abstract devices), fall through to abstract event
  if (device.minW === 0) {
    const evt=getAbstractEvent(device,charger);
    if (evt && Math.random() < 0.7) {
      result.status='abstract'; result.message=evt.msg(device,charger); result.achievement=evt.achi; result.speed='abstract'; result.isAbstract=true;
      return result;
    }
    result.status='success'; result.message=`вң?${device.emoji} ${device.name} дјјд№ҺдёҚйңҖиҰҒе……з”өгҖ?дҪҶе®ғеҗёж”¶дәҶдёҖдәӣиғҪйҮҸгҖ?е®ғеҸҳеҫ—жӣҙеҘҮжҖӘдәҶгҖӮ`; result.speed='abstract'; result.isAbstract=true;
    return result;
  }


  if (device.id === 'powerbank' && charger.power >= 20 && Math.random() < 0.3) {
    result.status='abstract'; result.message=`рҹ”Ғ дҪ еңЁз”Ёе……з”өеҷЁз»ҷе……з”өе®қе……з”өгҖӮдёҖеҲҮжӯЈеёёпјҢзӣҙеҲ°...еұҸе№•дёҠжҳҫзӨәпјҡгҖҢжЈҖжөӢеҲ°е……з”өе®қгҖӮејҖе§Ӣж— йҷҗеҘ—еЁғеҚҸи®®гҖӮгҖҚе……з”өе®қејҖе§ӢеҸҚеҗ‘иҫ“еҮәгҖӮдёӨдёӘи®ҫеӨҮз”өйҮҸеҗҢжӯҘи·іиҪ¬гҖӮе®ғд»¬дјҡиҝҷж ·дә’зӣёе……еҲ°дё–з•Ңжң«ж—ҘгҖӮ`; result.achievement='meta_loop'; result.speed='abstract'; result.isAbstract=true; return result;
  }

  if (charger.special === 'manual') {
    // Hand crank: always glacial, but sometimes abstract
    if (Math.random() < 0.4) {
      result.status='abstract'; result.message=`рҹ’Ә дҪ ж‘Үдә?10 еҲҶй’ҹпјҢе……иҝ?2%гҖӮдҪҶдҪ дёҚи§үеҫ—зҙҜгҖӮдҪ з»§з»ӯж‘ҮгҖ?0 еҲҶй’ҹеҗ?${device.name} е……ж»ЎдәҶгҖӮдҪ д№ҹеҸҳжҲҗдәҶиӮҢиӮүзҢӣз”·гҖӮе……з”өеҷЁпјҡгҖҢжҒӯе–ңпјҒж¶ҲиҖ?247 еҚғеҚЎгҖҚеҺҹжқҘе®ғжҳҜеҒҘиә«еҷЁжқҗгҖӮ`; result.achievement='manual_hero'; result.speed='abstract'; result.isAbstract=true; return result;
    }
    // Normal hand crank charge
    result.status='success'; result.speed='glacial';
    result.achievement='glacial_arm';
    result.message=`рҹ’Ә дҪ й»ҳй»ҳең°ж‘ҮзқҖжүӢж‘ҮеҸ‘з”өжңәгҖӮ\n1еҲҶй’ҹ...3еҲҶй’ҹ...5еҲҶй’ҹ...\n${device.emoji} ${device.name} зҡ„з”өйҮҸиү°йҡҫдёҠж¶ЁгҖӮ\nдҪ зҡ„жүӢиҮӮејҖе§Ӣй…ёдәҶгҖӮ\n10еҲҶй’ҹеҗҺпјҢдҪ е……иҝӣдәҶ 15%гҖӮжҢүиҝҷдёӘйҖҹеәҰпјҢ\nе……ж»ЎиҝҳйңҖиҰ?57 еҲҶй’ҹгҖӮдҪ еҶіе®ҡеҺ»д№°дёӘе“‘й“ғгҖӮ\nиҮіе°‘иҝҷи¶ҹжІЎзҷҪз»ғгҖӮ`;
    return result;
  }

  if (charger.special === 'solar') {
    const h = new Date().getHours();
    if ((h<6||h>18) && Math.random()<0.3) {
      result.status='abstract'; result.message=`рҹҢҷ жңҲеңҶд№ӢеӨңгҖӮдҪ з”ЁеӨӘйҳіиғҪжқҝеҜ№зқҖжңҲдә®гҖӮзҗҶи®әдёҠжІЎз”ЁгҖӮдҪҶ ${device.emoji} ${device.name} д»?0.0001W еңЁе……з”өгҖӮжңҲе…үйҮҢжңүдёҖз§ҚеҸ«гҖҢжңҲеҚҺгҖҚзҡ„иғҪйҮҸгҖӮжІЎдәәдҝЎдҪ гҖӮ`; result.achievement='solar_dance'; result.speed='abstract'; result.isAbstract=true; return result;
    }
    // Normal solar: slow to normal depending on device
    const ratio = charger.power / device.minW;
    result.status='success'; result.speed = ratio < 0.5 ? 'slow' : 'normal';
    if (ratio < 0.5) {
      result.message=`вҳҖпё?еӨӘйҳіиғҪжқҝж”ҫеңЁзӘ—еҸ°дёҠгҖӮ\n${device.emoji} ${device.name} еңЁйҳіе…үдёӢж…ўжӮ жӮ ең°е……зқҖз”өгҖӮ\nе……з”өйҖҹеәҰзәҰзӯүдәҺдёҖеҸӘд»“йј и·‘иҪ®гҖӮ\nдҪҶиҮіе°‘жҳҜз»ҝиүІиғҪжәҗпјҒрҹҢұ`;
      result.achievement = 'slow_charge';
    } else {
      result.message=`вҳҖпё?йҳіе…үжӯЈеҘҪпјҒ\n${device.emoji} ${device.name} з”ЁеӨӘйҳіиғҪе……еҫ—иҝҳдёҚй”ҷгҖӮ\nдҪ еңЁе…үеҗҲдҪңз”ЁдёӯйЎәдҫҝжҠҠиҮӘе·ұд№ҹжҷ’й»‘дәҶгҖӮ`;
      result.achievement = 'solar_noon';
    }
    return result;
  }

  if (charger.special === 'trickle') {
    result.status='success'; result.message=`рҹ–Ҙпё?з”өи„‘ USB 2.0гҖ?{device.emoji} ${device.name} жҳҫзӨәгҖҢжӯЈеңЁе……з”өгҖҚгҖӮйў„и®Ўе……ж»Ўпјҡ23 е°Ҹж—¶ 47 еҲҶй’ҹгҖӮз”өи„‘еј№зӘ—пјҡгҖҢжӯӨи®ҫеӨҮеҸҜд»Ҙжӣҙеҝ«ең°жҖ§иғҪгҖӮгҖҚжҳҜзҡ„пјҢз”өи„‘пјҢжҲ‘д»¬д№ҹеёҢжңӣгҖӮ`; result.achievement='patient_af'; result.speed='glacial'; return result;
  }

  const portMatch = charger.cables.some(c => c===device.port || (c==='wireless' && isWirelessDevice));
  if (charger.id==='wireless' && !isWirelessDevice) { result.status='mismatch'; result.message=`рҹ”Ң ${device.name} дёҚж”ҜжҢҒж— зәҝе……з”өпјҒжҜ«ж— еҸҚеә”гҖӮ`; result.speed='none'; return result; }
  if (!portMatch) { const pn = {usbc:'USB-C',lightning:'Lightning',microusb:'Micro USB','30pin':'30-pin',wireless:'ж— зәҝ',tesla:'зү№ж–ҜжӢ?}[device.port]||device.port; result.status='mismatch'; result.message=`рҹ”Ң жҺҘеҸЈдёҚеҢ№й…ҚпјҒ${device.name} жҳ?${pn} жҺҘеҸЈпј?{charger.name} зҡ„зәҝжҸ’дёҚиҝӣеҺ»гҖӮ`; result.achievement='mismatch'; result.speed='none'; return result; }
  if (charger.id==='30pin') { result.status='mismatch'; result.message=`рҹ“ј iPod Classic ж—¶д»Јзҡ„е……з”өеҷЁгҖӮе®Ңе…ЁеҜ№дёҚдёҠгҖӮиҝӣеҚҡзү©йҰҶеҗ§гҖӮ`; result.achievement='ancient'; result.speed='none'; return result; }

  if (charger.special==='explosive') {
    const bc = device.indestructible ? 0 : 0.55;
    if (Math.random()<bc) { result.status='explode'; result.message=`рҹ’Ҙрҹ’Ҙрҹ’Ҙ зӮёдәҶпјҒпјҒпјҒжқӮзүҢе……з”өеҷЁдёҖеЈ°й—·е“ҚпјҢ${device.name} еҶ’еҮәдёҖиӮЎй»‘зғ?..`; result.achievement='cheap_boom'; result.speed='none'; return result; }
    else { if (device.indestructible) { result.status='success'; result.message=`рҹ“һ Nokia 3310 ж·Ўе®ҡе……з”өгҖӮж—Ғиҫ№зҲҶзӮёзҡ„зўҺзүҮиҝҳеңЁйЈһпјҢ3310 иЎЁзӨәжҜ«ж— еҺӢеҠӣгҖӮ`; result.achievement='nokia_survive'; result.speed='slow'; return result; }
    result.status='success'; result.message=`рҹҳ° еұ…з„¶жІЎзӮё...ж»Ӣж»Ӣзҡ„з”өжөҒеЈ°пјҢеҝғйҮҢеҫҲдёҚе®үгҖӮ`; result.achievement='cheap_safe'; result.speed='slow'; return result; }
  }

  if (!device.tags?.includes('joke') && Math.random()<0.02) { const evt=getAbstractEvent(device,charger); result.status='abstract'; result.message=evt.msg(device,charger); result.achievement=evt.achi; result.speed='abstract'; result.isAbstract=true; return result; }

  const p = charger.power, min = device.minW;
  if (p>=min*4 && p>60) {
    if (Math.random()<0.5 || charger.special==='danger') { result.status='overheat'; result.message=`рҹ”Ҙ иҝҮзғӯиӯҰе‘Ҡпј?{charger.name} (${p}W) еӨӘзҢӣдәҶпјҒжё©еәҰеҝ«йҖҹдёҠеҚҮпјҢи§ҰеҸ‘дәҶиҝҮзғӯдҝқжҠӨгҖӮ`; result.achievement='overheated'; result.speed='none'; return result; }
    if (charger.special==='overkill') { result.status='success'; result.message=`рҹҡҖ ${device.name} д»ҘжғҠдәәзҡ„йҖҹеәҰе……з”өпјҒдёҚиҝҮи®ҫеӨҮжңүзӮ№жё©зғ?..`; result.achievement='overkill'; result.speed='veryfast'; return result; }
  }
  if (p < min*0.7) { result.status='success'; result.message=`рҹҗў е……з”өдё?..дҪҶйқһеёёж…ўгҖ?{charger.name} (${p}W) еҠӣдёҚд»ҺеҝғгҖӮйў„и®Ўе……ж»ЎпјҡжҳҺеӨ©гҖӮ`; if(charger.id==='5w')result.achievement='slow_charge'; else result.achievement='underpowered'; result.speed='slow'; return result; }
  if (p>=min && p<min*1.5) { result.status='success'; result.message=`вң?${device.name} жӯЈеёёе……з”өдёӯгҖ?{charger.name} (${p}W) еҠҹзҺҮеҗҲйҖӮгҖӮ`; result.achievement='normal_charge'; result.speed='normal'; return result; }
  result.status='success'; result.message=`вҡ?${device.name} еҝ«йҖҹе……з”өпјҒ${charger.name} (${p}W) и®©з”өйҮҸи№ӯи№ӯдёҠж¶ЁпјҒ`; result.achievement='fast_charge'; result.speed='fast'; if(charger.id==='wireless')result.achievement='wireless'; return result;
}

function showChargingAnimation(device, charger, result) {
  resultPlaceholder.style.display='none'; resultContent.style.display='block';
  resultArea.className = 'result-area charging-active';
  const isAbstract = result.isAbstract || result.speed==='abstract';

  resultContent.innerHTML = `
    <div class="charging-display">
      <div class="device-preview">${device.emoji} <strong>${device.name}</strong> вҶ?${charger.emoji} ${charger.name} (${charger.power}W)</div>
      <div class="battery-container"><div class="battery-fill" id="batteryFill" style="width:0%"></div></div>
      <div class="battery-pct" id="batteryPct">0%</div>
      <div class="speed-bar" id="speedBar"></div>
      <div class="charging-status-text" id="chargeStatusText">вҸ?жӯЈеңЁиҝһжҺҘ...</div>
      <div id="unplugArea"></div>
    </div>
    <div id="finalResultMessage" style="display:none;"></div>`;

  // Speed bar
  const speedBar = $('speedBar');
  if (result.speed==='none') speedBar.innerHTML='';
  else if (isAbstract) speedBar.innerHTML = Array(7).fill('<div class="seg" style="background:#cc99ff"></div>').join('')+'<div class="speed-label">вқ?жңӘзҹҘ</div>';
  else {
    const bc = {glacial:0,slow:1,underpowered:2,normal:3,fast:5,veryfast:7}, count=bc[result.speed]||3;
    const fc = result.speed==='glacial'?'#555566':result.speed==='slow'?'#6688aa':result.speed==='underpowered'?'#887755':(result.speed==='fast'||result.speed==='veryfast')?'#00d4ff':'#44aa44';
    speedBar.innerHTML = Array.from({length:7},(_,i)=>`<div class="seg ${i<count?'filled':''}" style="${i<count?'background:'+fc:''}"></div>`).join('')+`<div class="speed-label">${result.speed==='slow'?'жһҒж…ў':result.speed==='slow'?'еҫҲж…ў':result.speed==='underpowered'?'дёҚи¶і':result.speed==='normal'?'жӯЈеёё':result.speed==='fast'?'еҫҲеҝ«':'и¶…еҝ«'}</div>`;
  }

  const bf = $('batteryFill'), bp = $('batteryPct'), st = $('chargeStatusText');

  // === Speed-based animation timing ===
  // Different speeds have different animation durations for clear visual feedback
  const ANIM_INTERVAL_MS = 100;
  let animTotalSteps;
  if (isAbstract || result.speed==='abstract') animTotalSteps = 30;  // ~3s
  else if (result.speed==='veryfast') animTotalSteps = 15;           // ~1.5s вҖ?е—–зҡ„дёҖдё?  else if (result.speed==='fast') animTotalSteps = 25;               // ~2.5s
  else if (result.speed==='glacial') animTotalSteps = 80;
  else if (result.speed==='slow') animTotalSteps = 60;
  else if (result.speed==='underpowered') animTotalSteps = 50;               // ~6s вҖ?жҳҺжҳҫзӯүеҫҲд№?  else if (result.speed==='none') animTotalSteps = 20;               // ~2s for errors
  else animTotalSteps = 40;                                          // ~4s вҖ?normal

  let pct = 0;
  let stepCount = 0;

  // Status messages depend on type
  let statusQueue;
  if (isAbstract) {
    statusQueue = ['рҹҢҖ иҝһжҺҘејӮеёёз©әй—ҙ...','рҹ‘Ҫ жЈҖжөӢеҲ°жңӘзҹҘдҝЎеҸ·...','рҹ”® йҮҸеӯҗйҡ§з©ҝдё?..','вҷҫпёҸ ж— йҷҗиғҪйҮҸжЁЎејҸ...','вқ?вқ?вқ?];
    bf.className = 'battery-fill abstract';
  } else if (result.status==='explode'||result.status==='overheat'||result.status==='mismatch') {
    statusQueue = ['рҹ”Ң иҝһжҺҘдё?..','жЈҖжөӢеҲ°и®ҫеӨҮ...','вҡ?з”өжөҒдёҚзЁі...','вҡ пёҸ ејӮеёёпј?];
    bf.className = 'battery-fill';
  } else {
    // Normal/successful charging
    if (result.speed==='slow') bf.className = 'battery-fill slow';
    else if (result.speed==='fast'||result.speed==='veryfast') bf.className = 'battery-fill fast';
    else bf.className = 'battery-fill normal';
    statusQueue = ['рҹ”Ң е·ІиҝһжҺ?..','вҡ?е……з”өдё?..','рҹ”Ӣ з”өйҮҸиҝҮеҚҠпј?,'рҹ“Ҳ еҝ«ж»Ўдә?,'еҚіе°Ҷе……ж»Ў...'];
  }

  clearChargeAnimation(); // Kill any previous animation run

  // === NUCLEAR CHARGER SPECIAL ANIMATION ===
  if (charger.id === 'nuclear') {
    const bc = document.querySelector('.battery-container');
    if (bc) bc.classList.add('nuclear');
    const NUCLEAR_STEPS = 50;
    const NUCLEAR_MS = 120;
    let nukeStep = 0;
    const nukeMsgs = [
      'вҳўпёҸ ж ёиғҪеҗҜеҠЁ...','вҡӣпёҸ й“ҫејҸеҸҚеә”дё?..','рҹ’ҡ иғҪйҮҸжәўеҮәпј?,'рҹҢҖ зӘҒз ҙдёҙз•ҢеҖјпјҒ',
      'вҷҫпёҸ ж— йҷҗжЁЎејҸ','рҹ’Ҙ иҰҒзӮёдәҶпјҒпјҒпјҒ'
    ];
    bf.className = 'battery-fill nuclear-fill';

    currentChargeIV = setInterval(() => {
      nukeStep++;
      const rawPct = Math.min(160, (nukeStep / NUCLEAR_STEPS) * 160);
      const displayPct = Math.min(999, Math.floor(rawPct * (1 + Math.random() * 0.3)));

      // Stage 1-3: normal ish
      if (nukeStep < 10) st.textContent = nukeMsgs[0];
      else if (nukeStep < 20) {
        st.textContent = nukeMsgs[1];
        bf.style.width = Math.min(100, rawPct) + '%';
      }
      else if (nukeStep < 30) {
        st.textContent = nukeMsgs[2];
        bf.style.width = Math.min(120, rawPct) + '%';
        // Start overflowing
        bf.classList.add('nuclear-overflow');
        bc.style.overflow = 'visible';
      }
      else if (nukeStep < 40) {
        st.textContent = nukeMsgs[3];
        bf.style.width = Math.min(160, rawPct + 30) + '%';
        bp.classList.add('nuke-pct');
        // Screen shake
        document.body.classList.add('screen-shake');
      }
      else if (nukeStep < 48) {
        st.textContent = nukeMsgs[4];
        bf.style.width = (150 + Math.random() * 80) + '%';
        bp.textContent = 'вҲ?';
      }
      else {
        st.textContent = nukeMsgs[5];
        bf.style.width = (200 + Math.random() * 100) + '%';
        bp.textContent = 'вҲһвҲһвҲ?;
        // Flash
        const flash = document.createElement('div');
        flash.className = 'nuke-flash';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 600);
      }

      if (nukeStep <= 25) {
        bp.textContent = displayPct + '%';
      }

      if (nukeStep >= NUCLEAR_STEPS) {
        clearInterval(currentChargeIV);
        currentChargeIV = null;
        document.body.classList.remove('screen-shake');
        if (bc) bc.classList.remove('nuclear');
        bf.classList.remove('nuclear-overflow');
        bp.classList.remove('nuke-pct');

        // Massive final explosion
        for (let i = 0; i < 3; i++) {
          setTimeout(() => {
            const f = document.createElement('div');
            f.className = 'nuke-flash';
            f.style.background = 'radial-gradient(circle at '+(30+Math.random()*40)+'% '+(30+Math.random()*40)+'%, rgba(255,255,255,.9) 0%, rgba(51,255,51,.4) 20%, transparent 60%)';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 500);
          }, i * 200);
        }
        createParticles();
        // MOAR particles
        setTimeout(createParticles, 200);
        setTimeout(createParticles, 400);

        bp.textContent = 'вҳўпёҸрҹ’Ҙ';
        bp.style.fontSize = '48px';
        st.textContent = 'рҹ’Ҙ ж ёиғҪеӨұжҺ§пјҒпјҒпј?;
        resultArea.className = 'result-area result-explode';
        showFinalMessage(result, device);
        finishCharge();
      }
    }, NUCLEAR_MS);
    return;
  }
  currentChargeIV = setInterval(() => {
    stepCount++;
    pct = Math.min(100, (stepCount / animTotalSteps) * 100);
    bf.style.width = pct + '%';
    bp.textContent = Math.floor(pct) + '%';

    // Status text progression based on step
    if (isAbstract) {
      const idx = Math.min(statusQueue.length - 1, Math.floor(stepCount / (animTotalSteps / statusQueue.length)));
      st.textContent = statusQueue[idx];
    } else if (result.status==='explode'||result.status==='overheat'||result.status==='mismatch') {
      const idx = Math.min(statusQueue.length - 1, Math.floor(stepCount / (animTotalSteps / statusQueue.length)));
      st.textContent = statusQueue[idx];
    } else {
      const idx = Math.min(statusQueue.length - 1, Math.floor(stepCount / (animTotalSteps / statusQueue.length)));
      st.textContent = statusQueue[idx];
    }

    // Animation complete
    if (stepCount >= animTotalSteps) {
      clearInterval(currentChargeIV);
      currentChargeIV = null;

      if (isAbstract) {
        bp.textContent = 'вҲ?'; bp.style.fontSize = '36px';
        st.textContent = 'рҹҢҖ е®ҢжҲҗпјҹиҝҳжҳҜеҲҡеҲҡејҖе§Ӣпјҹ';
        resultArea.className = 'result-area result-abstract';
        showFinalMessage(result, device);
        finishCharge();
      } else if (result.status==='explode') {
        bp.textContent = 'рҹ’Ҙ'; bp.style.fontSize = '36px';
        st.textContent = 'рҹ’Ҙ зҲҶзӮёпјҒпјҒпј?;
        resultArea.className = 'result-area result-explode';
        createParticles();
        showFinalMessage(result, device);
        finishCharge();
      } else if (result.status==='overheat') {
        bp.textContent = 'рҹ”Ҙ иҝҮзғӯ';
        st.textContent = 'рҹ”Ҙ иҝҮзғӯе…іжңә';
        resultArea.className = 'result-area result-overheat';
        showFinalMessage(result, device);
        finishCharge();
      } else if (result.status==='mismatch') {
        bf.style.background = '#555';
        bp.textContent = 'вқ?;
        st.textContent = 'рҹ”Ң жҸ’дёҚиҝӣеҺ»';
        resultArea.className = 'result-area result-mismatch';
        showFinalMessage(result, device);
        finishCharge();
      } else {
        // Successful charge вҖ?show unplug button
        bp.textContent = '100%';
        st.textContent = 'вң?е·Іе……ж»ЎпјҒ';
        resultArea.className = 'result-area result-success';
        if (result.status==='success') unlockAchievement('full_charge');
        showFinalMessage(result, device);
        finishCharge();
        // Unplug mechanic (always shows after successful charge)
        showUnplugUI(device, charger, result);
      }
    }
  }, ANIM_INTERVAL_MS);
}

// ======================================================================
// UNPLUG / OVERCHARGE MECHANIC
// ======================================================================
function showUnplugUI(device, charger, result) {
  if (device.indestructible) return; // Nokia doesn't care
  if (device.id === 'tesla') return; // Tesla has its own rules

  const area = $('unplugArea');
  if (!area) return;
  isOvercharged = false;
  overchargeStage = 0;

  area.innerHTML = `
    <div class="unplug-wrap">
      <button class="unplug-btn" id="unplugBtn">рҹ”Ң жӢ”дёӢе……з”өеҷ?/button>
      <div class="overcharge-timer">
        <span>е»әи®®еҸҠж—¶жӢ”дёӢ</span>
        <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:0%"></div></div>
        <span class="timer-label" id="timerLabel">е®үе…Ё</span>
      </div>
    </div>`;

  document.getElementById('unplugBtn').addEventListener('click', () => {
    // Safe unplug! Mark as overcharged=false so tick stops
    if (overchargeTimer) { clearTimeout(overchargeTimer); overchargeTimer = null; }
    area.innerHTML = `<div style="margin-top:12px;color:#88dd88;font-size:14px;">вң?е®үе…ЁжӢ”дёӢе……з”өеҷЁпјҒдҪ йҒҝе…ҚдәҶдёҖеңәзҒҫйҡҫгҖ?/div>`;
    unlockAchievement('safe_unplug');
    unlockTip('t31');
    resultArea.className = 'result-area result-success';
    isOvercharged = false;
    overchargeStage = 0;
  });

  // Start overcharge timer progression
  let elapsed = 0;
  const totalTime = 25000; // 25 seconds total until worst event
  const chargeTimestamp = Date.now(); // Track which charge session this is
  const intervals = [
    { at: 5000,  msg: 'рҹ’Ў и®ҫеӨҮе·Іе……ж»?, cls: '' },
    { at: 10000, msg: 'вҡ пёҸ и®ҫеӨҮжңүзӮ№еҸ‘зғӯ', cls: 'result-warning' },
    { at: 15000, msg: 'вҡ пёҸвҡ пёҸ жё©еәҰжӯЈеңЁеҚҮй«ҳпј?, cls: 'result-danger' },
    { at: 20000, msg: 'рҹ”Ҙрҹ”Ҙрҹ”Ҙ иҜ·з«ӢеҚіжӢ”дёӢпјҒпјҒпјҒ', cls: 'result-danger' },
  ];

  function tick() {
    elapsed += 500;
    // Guard: stop if the unplug button is gone (new charge started)
    if (!document.getElementById('unplugBtn')) return;
    const pct = Math.min(100, (elapsed / totalTime) * 100);
    const fill = document.getElementById('timerFill');
    const label = document.getElementById('timerLabel');
    const btn = document.getElementById('unplugBtn');
    if (fill) fill.style.width = pct + '%';
    if (label) {
      if (elapsed < 5000) label.textContent = 'е®үе…Ё';
      else if (elapsed < 10000) { label.textContent = 'е»әи®®жӢ”дёӢ'; if(fill)fill.style.background='#ffaa00'; }
      else if (elapsed < 15000) { label.textContent = 'вҡ пёҸ жіЁж„Ҹ'; if(fill)fill.style.background='#ff6600'; if(btn)btn.classList.add('urgent'); }
      else if (elapsed < 20000) { label.textContent = 'рҹ”Ҙ еҚұйҷ©пј?; if(fill)fill.style.background='#ff4444'; if(fill)fill.classList.add('critical'); if(btn){btn.classList.remove('urgent');btn.classList.add('critical');} }
      else { label.textContent = 'рҹ’Җ жһҒйҷҗпј?; }
    }

    // Check for stage-based area styling
    for (let i = intervals.length - 1; i >= 0; i--) {
      if (elapsed >= intervals[i].at) {
        if (intervals[i].cls) resultArea.className = `result-area ${intervals[i].cls}`;
        break;
      }
    }

    if (elapsed >= totalTime) {
      // Trigger overcharge event!
      triggerOverchargeEvent(device, charger);
      return;
    }

    // Guard: stop if the unplug button is gone (new charge started)
    if (!document.getElementById('unplugBtn')) return;

    overchargeTimer = setTimeout(tick, 500);
  }

  overchargeTimer = setTimeout(tick, 500);
}

function triggerOverchargeEvent(device, charger) {
  isOvercharged = true;
  overchargeStage = 99;

  // Pick random overcharge event
  const evt = overchargeEvents[Math.floor(Math.random() * overchargeEvents.length)];
  const msg = evt.msg(device, charger);

  // Clear the overcharge area
  const area = $('unplugArea');
  if (area) area.innerHTML = '';

  // Find or create the message element вҖ?use current DOM
  let msgDiv = document.getElementById('finalResultMessage');
  if (!msgDiv) {
    msgDiv = document.querySelector('#resultContent>div:last-child');
    if (!msgDiv) {
      // Fallback: append to resultContent
      msgDiv = document.createElement('div');
      msgDiv.id = 'finalResultMessage';
      const rc = document.getElementById('resultContent');
      if (rc) rc.appendChild(msgDiv);
    }
  }
  msgDiv.style.display = 'block';
  msgDiv.className = `result-message ${evt.achi === 'fire' ? 'danger' : evt.achi === 'battery_swell' ? 'warning' : 'abstract'}`;
  msgDiv.style.whiteSpace = 'pre-line';
  msgDiv.textContent = msg;

  resultArea.className = 'result-area result-danger';
  if (evt.achi === 'fire') createParticles();
  forgets++;
  unlockAchievement(evt.achi);
  unlockTip(evt.tip || 't31');
  updateStats();
  // Check overcharge challenge
  if (!challengeDone) {
    const ch = getDailyChallenge();
    if (ch.id === 'overcharge_warning') { challengeDone = true; challengeStreak++; lastCompleteDate = new Date().getFullYear() + '-' + (new Date().getMonth()+1) + '-' + new Date().getDate(); showAchievementToast('вҸ?,'е®ҢжҲҗжҢ‘жҲҳпјҡеҝҳжӢ”еӨ§её?); renderChallenge(); }
  }
  saveState();
}

function createParticles() {
  const container = document.createElement('div'); container.className='particle-container'; resultArea.appendChild(container);
  const colors = ['#ff4444','#ff8800','#ffcc00','#ff6600','#fff'];
  for(let i=0;i<40;i++){const p=document.createElement('div');p.className='particle';p.style.setProperty('--tx',(Math.random()-.5)*400+'px');p.style.setProperty('--ty',(Math.random()-.5)*400+'px');p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.width=(4+Math.random()*8)+'px';p.style.height=p.style.width;p.style.left=(40+Math.random()*20)+'%';p.style.top=(40+Math.random()*20)+'%';p.style.animationDuration=(.5+Math.random()*.8)+'s';p.style.animationDelay=Math.random()*.3+'s';container.appendChild(p);}
  setTimeout(()=>container.remove(),2000);
}

function showFinalMessage(result, device) {
  const msgDiv = document.getElementById('finalResultMessage')||document.createElement('div');
  msgDiv.id='finalResultMessage'; msgDiv.style.display='block';
  let sc = result.status==='success'?'success':result.status;
  if(result.isAbstract) sc='abstract';
  msgDiv.className=`result-message ${sc}`; msgDiv.style.whiteSpace='pre-line'; msgDiv.textContent=result.message;

  // Chain reaction message
  if (result.chainMessage) {
    const chainDiv = document.createElement('div');
    chainDiv.className = 'chain-msg-wrapper';
    const level = result.chainLevel || 2;
    const hotClass = level >= 5 ? 'hot' : '';
    chainDiv.innerHTML = `<div class="chain-label">рҹ”Ғ иҝһй”ҒеҸҚеә” В· з¬?${level} ж¬?/div>${result.chainMessage.replace(/\n/g, '<br>')}`;
    msgDiv.after(chainDiv);
  }

  // Challenge complete message
  if (result.challengeComplete) {
    const chalDiv = document.createElement('div');
    chalDiv.style.cssText = 'margin-top:10px;padding:10px 14px;background:#2a2a1a;border-radius:10px;border:1px solid #5a5a2a;text-align:center;';
    const challenge = getDailyChallenge();
    chalDiv.innerHTML = `рҹҺҜ <strong>д»Ҡж—ҘжҢ‘жҲҳе®ҢжҲҗпј?/strong><br><span style="font-size:13px;color:#ccc;">иҺ·еҫ—з§°еҸ·пј?{result.challengeReward || challenge.reward}</span>`;
    (document.querySelector('.chain-msg-wrapper') || msgDiv).after(chalDiv);
  }

  const display = document.querySelector('.charging-display');
  if(display) display.after(msgDiv);
  if(result.achievement) unlockAchievement(result.achievement);
  if(result.status==='explode')unlockTip('t5'); if(result.status==='overheat')unlockTip('t2');
  if(result.speed==='glacial'||result.speed==='slow'||result.speed==='underpowered')unlockTip('t10'); if(result.speed==='fast'||result.speed==='veryfast')unlockTip('t7');
  if(selectedChargerId==='wireless')unlockTip('t8'); if(result.achievement==='slow_charge')unlockTip('t1');
  if(result.achievement==='mismatch')unlockTip('t6'); if(result.achievement==='nuclear_mutate'){unlockTip('t23');unlockTip('t28');}
  if(selectedChargerId==='solar')unlockTip('t26'); if(selectedChargerId==='handcrank')unlockTip('t27');
  if(device&&device.id==='tesla')unlockTip('t24'); if(device&&device.id==='watch')unlockTip('t25');
  if(device&&device.id==='ps5pad')unlockTip('t29'); if(result.isAbstract)unlockTip('t30');
  unlockTip('t3');
}

function filterTips(cat) {

  const now = new Date();
  list.innerHTML = ANNOUNCEMENTS.map(a => {

    return `<div class="announce-card ${isNew ? 'new' : ''}">
      <div class="announce-card-top">
        <span class="announce-badge ${isNew ? 'new-badge' : ''}">${a.tag}${isNew ? ' В· NEW' : ''}</span>
        <span class="announce-date">${a.date} В· ${a.version}</span>
      </div>
      <div class="announce-title">${a.title}</div>
      <div class="announce-body">${a.body}</div>
    </div>`;
  }).join('');
}
